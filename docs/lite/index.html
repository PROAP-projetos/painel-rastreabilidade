<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel iESGo-INEP (Lite)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="brandbar">
        <div class="brandbar-accent"></div>
        <div class="brandbar-body">
            <div class="brandbar-left">
                <div class="brandmark" aria-hidden="true"><i class="bi bi-bank"></i></div>
                <div class="brandbar-title">
                    <div class="org">Universidade Federal do Tocantins</div>
                    <div class="prod">Painel iESGo-INEP - Ações do PDI no PAT</div>
                </div>
            </div>
            <div class="brandbar-right">
                <span class="pill pill-label">
                    <i class="bi bi-diagram-3"></i> Ações consolidadas
                </span>
                <span class="pill pill-lite-badge">
                    <i class="bi bi-lightning-charge-fill"></i> Versão Lite
                </span>
                <button type="button" class="pill pill-toggle pill-tour-replay" onclick="abrirTourPrimeiraEntrada()">
                    <i class="bi bi-stars"></i> Ver tour
                </button>
            </div>
        </div>
    </div>

    <div class="container">

        <div class="lite-stats-row">
            <div class="lite-stat-item">
                <i class="bi bi-diagram-3"></i>
                <span class="lite-stat-value" id="total-consolidadas">0</span>
                <span class="lite-stat-label">Ações Consolidadas</span>
            </div>
            <div class="lite-stat-sep"></div>
            <div class="lite-stat-item">
                <i class="bi bi-funnel"></i>
                <span class="lite-stat-value" id="itens-encontrados">0</span>
                <span class="lite-stat-label">Resultados filtrados</span>
            </div>
        </div>

        <div class="filters-section filters-section-lite">
            <div class="filters-lite-row">
                <div class="filter-lite-item">
                    <div class="search-wrap">
                        <i class="bi bi-search filter-lite-icon"></i>
                        <input type="text" id="search" placeholder="Buscar na descrição da ação...">
                    </div>
                </div>
                <div class="filter-lite-item">
                    <div class="search-wrap">
                        <i class="bi bi-hash filter-lite-icon"></i>
                        <input type="text" id="filter-numero-acao" placeholder="Número da ação (ex: 1.1.2)">
                    </div>
                </div>
                <button class="clear-filters clear-filters-lite" onclick="limparFiltros()">
                    <i class="bi bi-arrow-counterclockwise"></i> Limpar
                </button>
            </div>
        </div>

        <div class="results-bar results-bar-lite" aria-live="polite">
            <div class="filters-active" id="filtros-ativos">Sem filtros ativos.</div>
        </div>

        <div class="consolidadas-container" id="consolidadas-container">
            <div class="loading">Carregando dados...</div>
        </div>

        <footer class="panel-footer" aria-label="Créditos do painel">
            Painel desenvolvido pelos estagiários da PROAP • UFT • 2026
        </footer>
    </div>

    <script src="painel_consolidacao.js"></script>
</body>
</html>
